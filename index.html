GETRAK - ACIONAMENTO DE GUINCHO
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acionamento de Guincho - Getrak</title>
<style>
body{font-family:Segoe UI,Arial,sans-serif;background:#f3f6fb;margin:0}
.header{background:#123a6d;color:#fff;padding:20px;text-align:center}
.container{max-width:1200px;margin:20px auto;padding:0 15px}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card h2{margin-top:0;color:#123a6d}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
label{font-weight:600;display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
textarea{min-height:280px}
.buttons{display:flex;gap:10px;flex-wrap:wrap}
button{border:none;padding:12px 18px;border-radius:8px;cursor:pointer;color:#fff;font-weight:bold}
.gen{background:#2563eb}.copy{background:#16a34a}.mail{background:#ea580c}
.hidden{display:none}
</style>
</head>
<body>
<div class="header"><h1>Acionamento de Guincho - Getrak</h1></div>
<div class="container">

<div class="card"><h2>Dados da Solicitação</h2>
<div class="grid">
<div><label>Tipo</label><input id="tipo" value="Veículo"></div>
<div><label>Cliente</label><input id="cliente" value="Getrak"></div>
<div><label>Produto</label><input id="produto" value="Assistência Veicular"></div>
<div><label>Plano</label><select id="plano"><option>Recuperação de veículo leve - furto, roubo ou apropriação indébita</option><option>Recuperação de veículo utilitário - furto, roubo ou apropriação indébita</option></select></div>
<div><label>CNPJ</label><input id="cnpj" value="Getrak - 06.349.959/0001-13"></div>
</div></div>

<div class="card"><h2>Contato</h2><label>Responsável pelo preenchimento</label><input id="contato"></div>

<div class="card"><h2>Dados do Veículo</h2><div class="grid">
<div><label>Placa</label><input id="placa"></div>
<div><label>Marca</label><input id="marca"></div>
<div><label>Modelo</label><input id="modelo"></div>
<div><label>Ano Fabricação</label><input id="anoFab"></div>
<div><label>Ano Modelo</label><input id="anoMod"></div>
<div><label>Câmbio</label><select id="cambio"><option>Automático</option><option>Manual</option></select></div>
<div><label>Tipo Veículo</label><select id="tipoVeiculo"><option>Automóvel</option><option>Motocicleta</option><option>Caminhão</option><option>Pick-up</option><option>Van</option><option>Ônibus</option></select></div>
<div><label>Renavam</label><input id="renavam" value="Não obrigatório"></div>
</div></div>

<div class="card"><h2>Endereços</h2><div class="grid">
<div><label>Endereço destino origem</label><input id="origem"></div>
<div><label>Endereço de destino:</label><select id="destino"></div><option selected>Base de prestador mais próximo</option><option>Destino final</option></div>
<div><label>Endereço em caso de destino final:</label><input id="destinoFinal"></div>
</div></div>

<div class="card"><h2>Questionário Obrigatório</h2><div class="grid">
<div><label>Fato Gerador</label><input id="fato" value="Recuperação de veículo"></div>
<div><label>Tipo de Serviço</label><select id="servico"><option selected>Reboque</option><option>Carga de bateria</option><option>Abertura de portas</option></select></div>
<div><label>Veículo aberto?</label><select id="aberto"><option selected>Sim</option><option>Não</option><option>Não sabe</option></select></div>
<div><label>Chave no local?</label><select id="chave"><option selected>Sim</option><option>Não</option><option>Não sabe</option></select></div>
<div><label>Documento no local?</label><select id="documento"><option selected>Não</option><option>Sim</option><option>Não sabe</option></select></div>
<div><label>Local</label><select id="local"><option selected>Via pública</option><option>Garagem coberta</option><option>Garagem descoberta</option><option>Garagem subsolo</option></select></div>
<div><label>Carregado?</label><select id="carregado"><option selected>Não</option><option>Sim</option><option>Não sabe</option></select></div>
<div><label>Rebaixado?</label><select id="rebaixado"><option selected>Não</option><option>Sim</option><option>Não sabe</option></select></div>
<div><label>BO presencial?</label><select id="bo"><option selected>Não</option><option>Sim</option><option>Não sabe</option></select></div>
<div><label>Liberado?</label><select id="liberado"><option selected>Sim</option><option>Não</option><option>Não sabe</option></select></div>
<div><label>Acompanhar reboque?</label><select id="acompanhar"><option selected>Não</option><option>Sim</option><option>Não sabe</option></select></div>
<div><label>Rodas livres?</label><select id="rodas" onchange="toggleRodas()"><option selected>Não</option><option>Sim</option><option>Não sabe</option></select></div>
<div id="rodasDiv"><label>Qtd. rodas travadas</label><input id="rodasTravadas"></div>
</div></div>

<div class="card"><h2>Contato</h2><label>Responsável no local</label><input id="contato"></div>

<div class="card">
<h2>Solicitação Gerada</h2>
<div class="buttons">
<button class="gen" onclick="gerarTexto()">Gerar Solicitação</button>
<button class="copy" onclick="copiarTexto()">Copiar Texto</button>
<button class="mail" onclick="enviarEmail()">Enviar E-mail</button>
</div><br>
<textarea id="resultado"></textarea>
</div>

</div>

<script>
function v(id){return document.getElementById(id).value;}
function toggleRodas(){
 document.getElementById('rodasDiv').style.display=(v('rodas')==='Não')?'block':'none';
}
function gerarTexto(){
const t=`ACIONAMENTO DE GUINCHO - GETRAK

Tipo: ${v('tipo')}
Cliente: ${v('cliente')}
Produto: ${v('produto')}
Plano: ${v('plano')}
CNPJ: ${v('cnpj')}

Nome: ${v('nome')}
Renavam: ${v('renavam')}
Placa: ${v('placa')}
Ano Fabricação: ${v('anoFab')}
Ano Modelo: ${v('anoMod')}
Marca: ${v('marca')}
Modelo: ${v('modelo')}
Câmbio: ${v('cambio')}
Tipo de Veículo: ${v('tipoVeiculo')}

Endereço Origem: ${v('origem')}
Endereço Destino: ${v('destino')}
Endereço Destino Final: ${v('destinoFinal')}

Fato Gerador: ${v('fato')}
Tipo de Serviço: ${v('servico')}
O veículo está aberto? ${v('aberto')}
A chave está no local? ${v('chave')}
Documento no local? ${v('documento')}
Local: ${v('local')}
Carregado? ${v('carregado')}
Rebaixado? ${v('rebaixado')}
BO presencial? ${v('bo')}
Liberado? ${v('liberado')}
Acompanhar reboque? ${v('acompanhar')}
Rodas livres? ${v('rodas')}
Rodas travadas: ${v('rodasTravadas')}

Contato do responsável: ${v('contato')}`;
document.getElementById('resultado').value=t;
}
function copiarTexto(){
gerarTexto();
navigator.clipboard.writeText(document.getElementById('resultado').value);
alert('Texto copiado!');
}
function enviarEmail(){
gerarTexto();
const placa=v('placa')||'SEM_PLACA';
const assunto='Solicitação de placa: '+placa;
const corpo=document.getElementById('resultado').value;
location.href='mailto:assistencia@grupoassistme.com.br,monitoramento.sc@getrak.com.br?subject='+encodeURIComponent(assunto)+'&body='+encodeURIComponent(corpo);
}
toggleRodas();
</script>
</body>
</html>
